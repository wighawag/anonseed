name: ci

# CI runs the acceptance gate on every push to main and on every pull request, so
# a regression is caught here, not only by a human driving locally. This is
# distinct from release.yml (tag-triggered build+publish via goreleaser): CI =
# every push/PR gate; release = cut a versioned build. They do not share a job.
#
# The single command below IS the repo's acceptance gate, from `.dorfl.json`
# `verify` (gofmt check + go vet + go build + go test).
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Run the .dorfl.json verify gate
        run: test -z "$(gofmt -l .)" && go vet ./... && go build ./... && go test ./...
